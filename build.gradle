plugins {
    id 'java'
}

group = 'com.selectiveadventure'
version = '1.0.0'
description = 'Region-based selective adventure-mode block permissions'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven {
        name = 'papermc'
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
}

dependencies {
    // Paper API. If this exact version does not resolve, change it to the
    // matching artifact for your server (e.g. 1.21.8-R0.1-SNAPSHOT).
    compileOnly 'io.papermc.paper:paper-api:1.21.11-R0.1-SNAPSHOT'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}

processResources {
    filteringCharset = 'UTF-8'
    def props = [version: version]
    inputs.properties(props)
    filesMatching('plugin.yml') {
        expand(props)
    }
}

// Produce a clean jar named SelectiveAdventure-<version>.jar in build/libs
jar {
    archiveBaseName = 'SelectiveAdventure'
}
